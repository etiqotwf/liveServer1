.writing{position:absolute;top:453px;left:400px;}
.reading{position:absolute;top:487px;left:400px;}
.listening{position:absolute;top:527px;left:400px;}
.speaking{position:absolute;top:565px;left:400px;}

<body>

<!-- ===== CARD ===== -->

<div class="verify-card">

<div class="institute">ILC TANTA Institute</div>
<div class="subtitle">Certificate Verification</div>

<div class="status" id="statusBox"></div>

<div class="info">

<div class="row"><span>Nom :</span> <span id="name"></span></div>
<div class="row"><span>Prénom :</span> <span id="prenom"></span></div>
<div class="row"><span>Date de naissance :</span> <span id="birthDate"></span></div>
<div class="row"><span>Code Candidat :</span> <span id="candidateCode"></span></div>

<div class="row"><span>Centre :</span> <span id="centre"></span></div>
<div class="row"><span>Date Session :</span> <span id="sessionDate"></span></div>
<div class="row"><span>Date Résultats :</span> <span id="resultDate"></span></div>

<div class="row"><span>Writing :</span> <span id="writing"></span></div>
<div class="row"><span>Reading :</span> <span id="reading"></span></div>
<div class="row"><span>Listening :</span> <span id="listening"></span></div>
<div class="row"><span>Speaking :</span> <span id="speaking"></span></div>

<div class="row"><span>Niveau :</span> <span id="finalLevel"></span></div>

</div>

<div class="serial">
Serial : <span id="serial"></span>
</div>

<button class="viewBtn" onclick="showCertificate()">View Certificate</button>

</div>

<!-- ===== الشهادة ===== -->

<div id="certificate">

<div class="certContainer">

<img src="certificate.jpeg" class="bg">

<div class="name" id="certName"></div>
<div class="prenom" id="certPrenom"></div>
<div class="birth" id="certBirth"></div>
<div class="code" id="certCode"></div>

<div class="centre" id="certCentre"></div>
<div class="session" id="certSession"></div>
<div class="result" id="certResult"></div>

<div class="writing" id="certWriting"></div>
<div class="reading" id="certReading"></div>
<div class="listening" id="certListening"></div>
<div class="speaking" id="certSpeaking"></div>

<div class="level" id="certLevel"></div>

<div class="serialCert" id="certSerial"></div>

<div class="qr" id="certQR"></div>

</div>

</div>

<script>

function setStatus(message,type){

let box = document.getElementById("statusBox");

box.innerText = message;
box.className = "status " + type;

}

/* تحميل البيانات */

function loadCert(serial){

fetch("https://script.google.com/macros/s/AKfycbxkETTKzwQH-ukaoewtpqPj5D8Qau8O7d56l0Fab4SZmJHCMkcLH8lNISZJo3WXX-KwBw/exec?action=get&serial=" + serial)

.then(res=>res.json())

.then(cert=>{

if(!cert || Object.keys(cert).length === 0){
setStatus("❌ Certificate Not Found","error");
return;
}

/* حالة النجاح */
setStatus("✅ Certificate Verified","success");

/* CARD */

document.getElementById("name").innerText = cert.name || "";
document.getElementById("prenom").innerText = cert.prenom || "";
document.getElementById("birthDate").innerText = cert.birthDate || "";
document.getElementById("candidateCode").innerText = cert.candidateCode || "";

document.getElementById("centre").innerText = cert.centre || "";
document.getElementById("sessionDate").innerText = cert.sessionDate || "";
document.getElementById("resultDate").innerText = cert.resultDate || "";

document.getElementById("writing").innerText = cert.writing || "";
document.getElementById("reading").innerText = cert.reading || "";
document.getElementById("listening").innerText = cert.listening || "";
document.getElementById("speaking").innerText = cert.speaking || "";

document.getElementById("finalLevel").innerText = cert.finalLevel || "";

document.getElementById("serial").innerText = cert.serial;

/* CERTIFICATE */

document.getElementById("certName").innerText = cert.name;
document.getElementById("certPrenom").innerText = cert.prenom;
document.getElementById("certBirth").innerText = cert.birthDate;
document.getElementById("certCode").innerText = cert.candidateCode;

document.getElementById("certCentre").innerText = cert.centre;
document.getElementById("certSession").innerText = cert.sessionDate;
document.getElementById("certResult").innerText = cert.resultDate;

document.getElementById("certWriting").innerText = cert.writing;
document.getElementById("certReading").innerText = cert.reading;
document.getElementById("certListening").innerText = cert.listening;
document.getElementById("certSpeaking").innerText = cert.speaking;

document.getElementById("certLevel").innerText = cert.finalLevel;

document.getElementById("certSerial").innerText = "Serial ILC : " + cert.serial;

/* QR */

let link = "https://etiqotwf.github.io/liveServer1/ilc/ilcCertificateF/verify.html?serial=" + cert.serial;

document.getElementById("certQR").innerHTML = "";

if(cert.serial){
new QRCode(document.getElementById("certQR"),{
text:link,
width:100,
height:100
});
}

})

.catch(err=>{
console.error(err);
setStatus("⚠️ Error loading certificate","warning");
});

}

/* عرض الشهادة */

function showCertificate(){
document.getElementById("certificate").style.display="block";
}

/* إغلاق الشهادة */

document.getElementById("certificate").addEventListener("click",function(){
this.style.display="none";
});

/* قراءة Serial من URL */

let params = new URLSearchParams(window.location.search);
let serial = params.get("serial");

if(serial){
loadCert(serial);
}else{
setStatus("⚠️ No Serial Provided","warning");
}

</script>

</body>
</html>

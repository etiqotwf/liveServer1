<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Certificate Verification</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#0f172a,#1e293b);
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
}

/* ===== CARD ===== */

.verify-card{
background:white;
width:90%;
max-width:420px;
border-radius:14px;
padding:25px;
box-shadow:0 20px 60px rgba(0,0,0,.3);
text-align:center;
}

.institute{
font-size:26px;
font-weight:800;
color:#0f172a;
}

.subtitle{
color:#64748b;
margin-bottom:15px;
}

.status{
background:#dcfce7;
color:#166534;
padding:10px;
border-radius:6px;
font-weight:600;
margin-bottom:20px;
}

.info{
background:#f8fafc;
padding:20px;
border-radius:10px;
text-align:left;
}

.row{
margin:8px 0;
}

.row span{
font-weight:bold;
}

.serial{
margin-top:15px;
font-size:14px;
color:#475569;
}

.viewBtn{
margin-top:20px;
padding:12px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

/* ===== CERTIFICATE ===== */

#certificate{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
z-index:1000;
overflow:auto;
cursor:pointer;
}

.certContainer{
position:relative;
width:641px;
height:907px;
margin:40px auto;
background:white;
}

.bg{
position:absolute;
width:100%;
height:100%;
}

/* ===== أماكن البيانات (مظبوطة حسب الصورة) ===== */

.name{position:absolute;top:300px;left:350px;font-weight:bold;}
.prenom{position:absolute;top:330px;left:350px;}
.birth{position:absolute;top:360px;left:350px;}
.code{position:absolute;top:390px;left:350px;}

.centre{position:absolute;top:445px;left:350px;}
.session{position:absolute;top:475px;left:350px;}
.result{position:absolute;top:505px;left:350px;}

.writing{position:absolute;top:585px;left:420px;}
.reading{position:absolute;top:620px;left:420px;}
.listening{position:absolute;top:655px;left:420px;}
.speaking{position:absolute;top:690px;left:420px;}

.level{position:absolute;top:740px;left:420px;font-weight:bold;}

.serialCert{
position:absolute;
top:210px;
right:90px;
font-weight:bold;
}

.qr{
position:absolute;
bottom:150px;
right:80px;
}

</style>

</head>

<body>

<!-- ===== CARD ===== -->

<div class="verify-card">

<div class="institute">ILC TANTA Institute</div>
<div class="subtitle">Certificate Verification</div>

<div class="status">✅ Certificate Verified</div>

<div class="info">

<div class="row"><span>Nom :</span> <div id="name"></div></div>
<div class="row"><span>Prénom :</span> <div id="prenom"></div></div>
<div class="row"><span>Date de naissance :</span> <div id="birthDate"></div></div>
<div class="row"><span>Code Candidat :</span> <div id="candidateCode"></div></div>

<div class="row"><span>Centre :</span> <div id="centre"></div></div>
<div class="row"><span>Date Session :</span> <div id="sessionDate"></div></div>
<div class="row"><span>Date Résultats :</span> <div id="resultDate"></div></div>

<div class="row"><span>Writing :</span> <div id="writing"></div></div>
<div class="row"><span>Reading :</span> <div id="reading"></div></div>
<div class="row"><span>Listening :</span> <div id="listening"></div></div>
<div class="row"><span>Speaking :</span> <div id="speaking"></div></div>

<div class="row"><span>Niveau :</span> <div id="finalLevel"></div></div>

</div>

<div class="serial">
Serial : <span id="serial"></span>
</div>

<button class="viewBtn" onclick="showCertificate()">View Certificate</button>

</div>

<!-- ===== الشهادة ===== -->

<div id="certificate">

<div class="certContainer">

<img src="certificate.jpeg" class="bg">

<div class="name" id="certName"></div>
<div class="prenom" id="certPrenom"></div>
<div class="birth" id="certBirth"></div>
<div class="code" id="certCode"></div>

<div class="centre" id="certCentre"></div>
<div class="session" id="certSession"></div>
<div class="result" id="certResult"></div>

<div class="writing" id="certWriting"></div>
<div class="reading" id="certReading"></div>
<div class="listening" id="certListening"></div>
<div class="speaking" id="certSpeaking"></div>

<div class="level" id="certLevel"></div>

<div class="serialCert" id="certSerial"></div>

<div class="qr" id="certQR"></div>

</div>

</div>

<script>

function loadCert(serial){

fetch("https://script.google.com/macros/s/AKfycbyqvacwgvC6UionZ7SmsI9HJUTOB_9isWkHWckaaf5UNGJnlqWaCnmabVAKtDv5ZDN6hg/exec?action=get&serial=" + serial)

.then(res=>res.json())

.then(cert=>{

if(!cert){
alert("Certificate not found");
return;
}

/* CARD */

document.getElementById("name").innerText = cert.name || "";
document.getElementById("prenom").innerText = cert.prenom || "";
document.getElementById("birthDate").innerText = cert.birthDate || "";
document.getElementById("candidateCode").innerText = cert.candidateCode || "";

document.getElementById("centre").innerText = cert.centre || "";
document.getElementById("sessionDate").innerText = cert.sessionDate || "";
document.getElementById("resultDate").innerText = cert.resultDate || "";

document.getElementById("writing").innerText = cert.writing || "";
document.getElementById("reading").innerText = cert.reading || "";
document.getElementById("listening").innerText = cert.listening || "";
document.getElementById("speaking").innerText = cert.speaking || "";

document.getElementById("finalLevel").innerText = cert.finalLevel || "";

document.getElementById("serial").innerText = cert.serial;

/* CERTIFICATE */

document.getElementById("certName").innerText = cert.name;
document.getElementById("certPrenom").innerText = cert.prenom;
document.getElementById("certBirth").innerText = cert.birthDate;
document.getElementById("certCode").innerText = cert.candidateCode;

document.getElementById("certCentre").innerText = cert.centre;
document.getElementById("certSession").innerText = cert.sessionDate;
document.getElementById("certResult").innerText = cert.resultDate;

document.getElementById("certWriting").innerText = cert.writing;
document.getElementById("certReading").innerText = cert.reading;
document.getElementById("certListening").innerText = cert.listening;
document.getElementById("certSpeaking").innerText = cert.speaking;

document.getElementById("certLevel").innerText = cert.finalLevel;

document.getElementById("certSerial").innerText = "Serial ILC : " + cert.serial;

/* QR */

let link = "https://etiqotwf.github.io/liveServer1/ilc/ilcCertificateF/verify.html?serial=" + cert.serial;

document.getElementById("certQR").innerHTML = "";

new QRCode(document.getElementById("certQR"),{
text:link,
width:100,
height:100
});

})

.catch(err=>{
console.error(err);
});

}

/* عرض الشهادة */

function showCertificate(){
document.getElementById("certificate").style.display="block";
}

/* تحميل من QR */

let params = new URLSearchParams(window.location.search);
let serial = params.get("serial");

if(serial){
loadCert(serial);
}

</script>

</body>
</html>

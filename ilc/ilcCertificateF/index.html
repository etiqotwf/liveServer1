<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Certificate Generator</title>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
padding:0;
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:#333;
min-height:100vh;
}

/* ===== ADMIN PANEL ===== */

.admin{

max-width:950px;
margin:40px auto;

background:white;
padding:30px;

border-radius:12px;

box-shadow:0 15px 40px rgba(0,0,0,0.25);

}

.admin h2{
margin-top:0;
color:#0f172a;
}

.admin h3{
color:#334155;
margin-top:25px;
}

/* ===== INPUTS ===== */

input{

padding:12px 14px;
margin:6px;

width:200px;

border:1px solid #cbd5e1;

border-radius:6px;

font-size:14px;

transition:0.3s;

}

input:focus{

outline:none;

border-color:#3b82f6;

box-shadow:0 0 0 3px rgba(59,130,246,0.15);

}

/* ===== BUTTONS ===== */

button{

padding:12px 20px;

border:none;

border-radius:6px;

cursor:pointer;

font-size:14px;

font-weight:600;

margin:5px;

transition:0.3s;

}

/* generate */

button:nth-of-type(1){

background:#2563eb;
color:white;

}

button:nth-of-type(1):hover{

background:#1d4ed8;

}

/* download */

#downloadBtn{

background:#10b981;
color:white;

}

#downloadBtn:hover{

background:#059669;

}

/* search */

button:last-of-type{

background:#f59e0b;
color:white;

}

button:last-of-type:hover{

background:#d97706;

}

/* ===== CERTIFICATE AREA ===== */

#certificate{
width:794px;
height:1123px;
}

/* البيانات الشخصية */
.nom{
position:absolute;
top:250px;
left:80px;
font-size:20px;
}

.prenom{
position:absolute;
top:280px;
left:80px;
font-size:20px;
}

.birth{
position:absolute;
top:310px;
left:80px;
font-size:20px;
}

.code{
position:absolute;
top:340px;
left:80px;
font-size:20px;
}

/* بيانات المركز */
.centre{
position:absolute;
top:390px;
left:80px;
font-size:20px;
}

.sessionDate{
position:absolute;
top:420px;
left:80px;
font-size:20px;
}

.resultDate{
position:absolute;
top:450px;
left:80px;
font-size:20px;
}

/* النتائج */
.writing{
position:absolute;
top:560px;
left:120px;
}

.reading{
position:absolute;
top:600px;
left:120px;
}

.listening{
position:absolute;
top:640px;
left:120px;
}

.speaking{
position:absolute;
top:680px;
left:120px;
}

/* المستوى النهائي */
.finalLevel{
position:absolute;
top:750px;
left:300px;
font-size:22px;
font-weight:bold;
}

/* serial */
.serial{
position:absolute;
top:180px;
right:100px;
font-size:18px;
}
/* QR */

.qr{

position:absolute;

bottom:150px;

right:80px;

}

/* ===== Responsive ===== */

@media(max-width:700px){

#certificate{

transform:scale(.7);
transform-origin:top;

}

}

.app-title{

text-align:center;

font-size:40px;

font-weight:900;

margin-top:30px;

letter-spacing:2px;

/* metallic gamer gradient */

background: linear-gradient(
120deg,
#7f1d1d,
#991b1b,
#1e3a8a,
#312e81,
#7f1d1d
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

/* shine */


}


/* الخط المعدني تحت العنوان */

.app-title::after{

content:"";

display:block;

width:320px;

height:4px;

margin:12px auto;

background: linear-gradient(
90deg,
#ff00cc,
#00ffff,
#00ff9d,
#ffe600,
#ff00cc
);

border-radius:6px;

box-shadow:0 0 6px rgba(255,255,255,0.3);

}



.cert-table{

width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;

}

.cert-table th{

background:#111827;
color:white;
padding:10px;

}

.cert-table td{

padding:10px;
border-bottom:1px solid #ddd;
text-align:center;

}

.cert-table tr:hover{

background:#f1f5f9;

}

.cert-table button{

padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
margin:2px;

}

.cert-table button:nth-child(1){

background:#2563eb;
color:white;

}

.cert-table button:nth-child(2){

background:#16a34a;
color:white;

}

.cert-table button:nth-child(3){

background:#dc2626;
color:white;

}


/* container للسكرول */

.table-container{

max-height:300px;   /* تقريبا 5 صفوف */

overflow-y:auto;

border-radius:8px;

border:1px solid #e5e7eb;

}

/* شكل السكرول */

.table-container::-webkit-scrollbar{

width:8px;

}

.table-container::-webkit-scrollbar-track{

background:#f1f5f9;

}

.table-container::-webkit-scrollbar-thumb{

background:#64748b;

border-radius:4px;

}

.table-container::-webkit-scrollbar-thumb:hover{

background:#334155;

}

</style>
</head>

<body>


<div class="admin">

<h1 class="app-title">
  Certificate Management System 
</h1>
<h2>Admin Panel</h2>

<input id="nameInput" placeholder="Nom">
<input id="prenomInput" placeholder="Prénom">
<input id="birthInput" placeholder="Date de naissance">
<input id="codeInput" placeholder="Code candidat">

<input id="centreInput" placeholder="Centre">
<input id="sessionDateInput" placeholder="Date de la session">
<input id="resultDateInput" placeholder="Date de délivrance">

<br><br>

<h3>Résultats</h3>

<input id="writingInput" placeholder="Rédaction /10">
<input id="readingInput" placeholder="Lecture /10">
<input id="listeningInput" placeholder="Écoute /10">
<input id="speakingInput" placeholder="Oral /10">
<input id="finalLevelInput" placeholder="Niveau CECRL">
<br><br>

<button id="generateBtn" onclick="generate()">Generate Certificate</button>

<button onclick="updateCertificate()">Update Certificate</button>

<button id="downloadBtn">Download Image</button>

<button onclick="printCertificate()">Print Certificate</button>


<h3>Print Calibration</h3>

<button onclick="moveUp()">⬆ Up</button>
<button onclick="moveDown()">⬇ Down</button>
<button onclick="moveLeft()">⬅ Left</button>
<button onclick="moveRight()">➡ Right</button>
<button onclick="resetPrint()">Reset</button>

<br><br>

<h3>Search Certificate</h3>
<div id="adminTable"></div>
<input id="searchSerial" placeholder="Enter Serial Number">

<button onclick="searchCertificate()">Search</button>

<button onclick="showAdminTable()">Admin Dashboard</button>


</div>


<div id="certificate">

<img src="certificate.jpeg" class="bg">

<div class="nom" id="nom"></div>
<div class="prenom" id="prenom"></div>
<div class="birth" id="birth"></div>
<div class="code" id="code"></div>

<div class="centre" id="centre"></div>
<div class="sessionDate" id="sessionDate"></div>
<div class="resultDate" id="resultDate"></div>

<!-- scores -->
<div class="writing" id="writing"></div>
<div class="reading" id="reading"></div>
<div class="listening" id="listening"></div>
<div class="speaking" id="speaking"></div>

<div class="finalLevel" id="finalLevel"></div>

<div class="serial" id="serial"></div>

</div>

</div>

<script>

let offsetX = localStorage.getItem("printOffsetX") || 0;
let offsetY = localStorage.getItem("printOffsetY") || 0;


  let editingSerial = null;


    // عند الضغط على أي مكان في الصفحة، أدخل وضع ملء الشاشة
    document.addEventListener("click", () => {
      const elem = document.documentElement; // أو document.getElementById("myForm")
      if (document.fullscreenElement) return; // لا تفعل شيء إذا كنا بالفعل في ملء الشاشة

      if (elem.requestFullscreen) {
        elem.requestFullscreen();
      } else if (elem.webkitRequestFullscreen) { /* Safari */
        elem.webkitRequestFullscreen();
      } else if (elem.msRequestFullscreen) { /* IE11 */
        elem.msRequestFullscreen();
      }
    });

    function generateSerial(){
return Math.floor(10000000 + Math.random() * 90000000).toString();
}

function generate(){

try{

let btn = document.getElementById("generateBtn");

btn.disabled = true;
btn.innerText = "Generating...";

/* قراءة */

let nom = document.getElementById("nameInput").value;
let prenom = document.getElementById("prenomInput").value;
let birth = document.getElementById("birthInput").value;
let code = document.getElementById("codeInput").value;

let centre = document.getElementById("centreInput").value;
let sessionDate = document.getElementById("sessionDateInput").value;
let resultDate = document.getElementById("resultDateInput").value;

let writing = document.getElementById("writingInput").value;
let reading = document.getElementById("readingInput").value;
let listening = document.getElementById("listeningInput").value;
let speaking = document.getElementById("speakingInput").value;

let finalLevel = document.getElementById("finalLevelInput").value;

/* تحقق */

if(
!nom || !prenom || !birth || !code ||
!centre || !sessionDate || !resultDate ||
!writing || !reading || !listening || !speaking || !finalLevel
){
alert("Fill all fields");
throw "missing data";
}

/* Serial */

let serial = editingSerial ? editingSerial : generateSerial();

/* عرض */

document.getElementById("nom").innerText = nom;
document.getElementById("prenom").innerText = prenom;
document.getElementById("birth").innerText = birth;
document.getElementById("code").innerText = code;

document.getElementById("centre").innerText = centre;
document.getElementById("sessionDate").innerText = sessionDate;
document.getElementById("resultDate").innerText = resultDate;

document.getElementById("writing").innerText = writing;
document.getElementById("reading").innerText = reading;
document.getElementById("listening").innerText = listening;
document.getElementById("speaking").innerText = speaking;

document.getElementById("finalLevel").innerText = finalLevel;

document.getElementById("serial").innerText = "Serial: " + serial;

/* QR */

let qrContainer = document.getElementById("qrcode");

if(qrContainer){
qrContainer.innerHTML = "";
new QRCode(qrContainer,{
text:"verify:"+serial,
width:90,
height:90
});
}

/* حفظ */

let certs = JSON.parse(localStorage.getItem("certificates") || "[]");

certs.push({nom,prenom,birth,code,centre,sessionDate,resultDate,writing,reading,listening,speaking,finalLevel,serial});

localStorage.setItem("certificates", JSON.stringify(certs));

btn.innerText = "Done ✅";

}catch(err){

console.error("ERROR:", err);
alert("Error حصل — افتح Console");

let btn = document.getElementById("generateBtn");
btn.disabled = false;
btn.innerText = "Generate Certificate";

}

}

function download(){

const cert = document.getElementById("certificate");

html2canvas(cert,{
scale:3
}).then(canvas => {

const link = document.createElement("a");
link.download = "certificate.png";
link.href = canvas.toDataURL();
link.click();

});

}

document.getElementById("downloadBtn").addEventListener("click", download);


function searchCertificate(){

let serial=document.getElementById("searchSerial").value

let certs=JSON.parse(localStorage.getItem("certificates")||"[]")

let student=certs.find(c=>c.serial===serial)

if(student){

document.getElementById("name").innerText=student.name
document.getElementById("course").innerText=student.course
document.getElementById("grade").innerText=student.grade
document.getElementById("date").innerText=student.date
document.getElementById("serial").innerText="Serial : "+student.serial

document.getElementById("qrcode").innerHTML=""

let verifyLink="https://etiqotwf.github.io/liveServer1/ilc/ilcCertificate/verify.html?serial="+student.serial;

new QRCode(document.getElementById("qrcode"),{
text:verifyLink,
width:90,
height:90
})

}else{

alert("Certificate Not Found")

}

}


window.onload=function(){

let params=new URLSearchParams(window.location.search)

let serial=params.get("serial")

if(serial){

let certs=JSON.parse(localStorage.getItem("certificates")||"[]")

let student=certs.find(c=>c.serial===serial)

if(student){

document.getElementById("name").innerText=student.name
document.getElementById("course").innerText=student.course
document.getElementById("grade").innerText=student.grade
document.getElementById("date").innerText=student.date
document.getElementById("serial").innerText="Serial : "+student.serial

}

}

}


function showAdminTable(){

let container = document.getElementById("adminTable");

if(container.innerHTML !== ""){
container.innerHTML="";
return;
}

fetch("https://script.google.com/macros/s/AKfycbyqvacwgvC6UionZ7SmsI9HJUTOB_9isWkHWckaaf5UNGJnlqWaCnmabVAKtDv5ZDN6hg/exec?action=list")

.then(res=>res.json())

.then(certs=>{

let html = `
<h2>Certificates Dashboard</h2>

<div class="table-container">

<table class="cert-table">

<tr>
<th>Serial</th>
<th>Student</th>
<th>Course</th>
<th>Actions</th>
</tr>
`;

certs.forEach(cert=>{

html += `

<tr>

<td>${cert.serial}</td>

<td>${cert.name}</td>

<td>${cert.course}</td>

<td>

<button onclick="viewCert('${cert.serial}')">View</button>

<button onclick="editCert('${cert.serial}')">Edit</button>

<button onclick="deleteCert('${cert.serial}')">Delete</button>

</td>


</tr>

`;

});

html += `</table></div>`;

container.innerHTML = html;

});

}



function deleteCert(serial){

if(!confirm("Are you sure you want to delete this certificate?")){
return;
}

const formData = new URLSearchParams();

formData.append("action","delete");
formData.append("serial",serial);

fetch("https://script.google.com/macros/s/AKfycbyqvacwgvC6UionZ7SmsI9HJUTOB_9isWkHWckaaf5UNGJnlqWaCnmabVAKtDv5ZDN6hg/exec",{

method:"POST",

headers:{
"Content-Type":"application/x-www-form-urlencoded"
},

body:formData.toString()

})

.then(response => response.text())

.then(res => {


showAdminTable();

})

.catch(error => {

console.error(error);

alert("Error deleting certificate");

});

}


function viewCert(serial){

fetch("https://script.google.com/macros/s/AKfycbyqvacwgvC6UionZ7SmsI9HJUTOB_9isWkHWckaaf5UNGJnlqWaCnmabVAKtDv5ZDN6hg/exec?action=get&serial=" + serial)

.then(response => response.json())

.then(cert => {

if(!cert){
alert("Certificate not found");
return;
}

/* اصلاح التاريخ */

let formattedDate = cert.date.split("T")[0];

document.getElementById("nom").innerText = nom;
document.getElementById("prenom").innerText = prenom;
document.getElementById("birth").innerText = birth;
document.getElementById("code").innerText = code;

document.getElementById("centre").innerText = centre;
document.getElementById("sessionDate").innerText = sessionDate;
document.getElementById("resultDate").innerText = resultDate;

document.getElementById("writing").innerText = writing;
document.getElementById("reading").innerText = reading;
document.getElementById("listening").innerText = listening;
document.getElementById("speaking").innerText = speaking;

document.getElementById("finalLevel").innerText = finalLevel;

// إنشاء QR


let verifyLink="https://etiqotwf.github.io/liveServer1/ilc/ilcCertificate/verify.html?serial="+cert.serial;

new QRCode(document.getElementById("qrcode"),{
text:verifyLink,
width:90,
height:90
});

})

.catch(err => {

console.error(err);
alert("Error loading certificate");

});

}

function updateCertificate(){

if(!editingSerial){

alert("No certificate selected for editing");

return;

}

let name = document.getElementById("nameInput").value
let course = document.getElementById("courseInput").value
let grade = document.getElementById("gradeInput").value
let date = document.getElementById("dateInput").value

const formData = new URLSearchParams();

formData.append("action","update");
formData.append("name",name);
formData.append("course",course);
formData.append("grade",grade);
formData.append("date",date);
formData.append("serial",editingSerial);

fetch("https://script.google.com/macros/s/AKfycbyqvacwgvC6UionZ7SmsI9HJUTOB_9isWkHWckaaf5UNGJnlqWaCnmabVAKtDv5ZDN6hg/exec",{
method:"POST",

headers:{
"Content-Type":"application/x-www-form-urlencoded"
},

body:formData.toString()

})

.then(res => res.text())

.then(data => {



editingSerial = null;

document.getElementById("nameInput").value="";
document.getElementById("courseInput").value="";
document.getElementById("gradeInput").value="";
document.getElementById("dateInput").value="";

showAdminTable();

});

}
function editCert(serial){

fetch("https://script.google.com/macros/s/AKfycbyqvacwgvC6UionZ7SmsI9HJUTOB_9isWkHWckaaf5UNGJnlqWaCnmabVAKtDv5ZDN6hg/exec?action=get&serial=" + serial)

.then(res => res.json())

.then(cert => {

if(!cert){
alert("Certificate not found");
return;
}

/* تجهيز التاريخ */

let formattedDate = cert.date.split("T")[0];

/* ملء الفورم */

document.getElementById("nameInput").value = cert.name;
document.getElementById("courseInput").value = cert.course;
document.getElementById("gradeInput").value = cert.grade;
document.getElementById("dateInput").value = formattedDate;

editingSerial = cert.serial;

/* عرض الشهادة */

document.getElementById("name").innerText = cert.name;
document.getElementById("course").innerText = cert.course;
document.getElementById("grade").innerText = cert.grade;
document.getElementById("date").innerText = formattedDate;
document.getElementById("serial").innerText = "Serial ILC : " + serial

/* إنشاء QR */

document.getElementById("qrcode").innerHTML="";

let verifyLink="https://etiqotwf.github.io/liveServer1/ilc/ilcCertificate/verify.html?serial="+cert.serial;

new QRCode(document.getElementById("qrcode"),{
text:verifyLink,
width:90,
height:90
});

})

.catch(err=>{
console.error(err);
alert("Error loading certificate");
});

}



function printCertificate(){

let qrHTML = document.getElementById("qrcode").innerHTML;

let printContent = `
<html>
<head>

<style>

body{
margin:0;
padding:0;
}

/* نفس مقاسات الشهادة */

.print-area{
position:relative;
width:641px;
height:907px;
}

/* النصوص */

.name{
position:absolute;
top:525px;
left:0;
right:0;
text-align:center;
font-size:28px;
font-weight:bold;
}

.course{
position:absolute;
top:630px;
left:0;
right:0;
text-align:center;
font-size:26px;
font-weight:bold;
}

.date{
position:absolute;
bottom:125px;
left:205px;
font-size:18px;
font-weight:bold;
}

.grade{
position:absolute;
bottom:100px;
left:200px;
font-size:18px;
font-weight:bold;
}

.serial{
position:absolute;
bottom:715px;
right:80px;
font-size:16px;
font-weight:bold;
}

/* QR */

.qr{
position:absolute;
bottom:150px;
right:80px;
}

.qr img{
width:110px;
height:110px;
}

</style>

</head>

<body>

<div class="print-area" style="transform:translate(${offsetX}px,${offsetY}px)">

<div class="name">${document.getElementById("name").innerText}</div>

<div class="course">${document.getElementById("course").innerText}</div>

<div class="date">${document.getElementById("date").innerText}</div>

<div class="grade">${document.getElementById("grade").innerText}</div>

<div class="serial">${document.getElementById("serial").innerText}</div>

<div class="qr">${qrHTML}</div>

</div>

<script>

window.onload=function(){
window.print();
}

<\/script>

</body>
</html>
`;

let win = window.open("", "", "width=700,height=900");

win.document.write(printContent);

win.document.close();

}

function moveUp(){
offsetY--;
saveOffset();
}

function moveDown(){
offsetY++;
saveOffset();
}

function moveLeft(){
offsetX--;
saveOffset();
}

function moveRight(){
offsetX++;
saveOffset();
}

function resetPrint(){

offsetX=0;
offsetY=0;

saveOffset();

alert("Calibration Reset");

}

function saveOffset(){

localStorage.setItem("printOffsetX",offsetX);
localStorage.setItem("printOffsetY",offsetY);

alert("Offset X : "+offsetX+" | Offset Y : "+offsetY);

}


</script>

</body>
</html>

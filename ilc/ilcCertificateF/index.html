<style>

*{
box-sizing:border-box;
}

body{
margin:0;
padding:0;
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);

/* ===== ADMIN PANEL ===== */

.admin{

max-width:950px;
margin:40px auto;

background:white;
padding:30px;

border-radius:12px;

margin-top:0;

color:#334155;

/* ===== INPUTS ===== */

input{

padding:12px 14px;

position:relative;

width:641px;
height:907px;

margin:40px auto;

background:white;

border-radius:8px;

box-shadow:0 20px 60px rgba(0,0,0,0.4);

/* certificate bg */

.birthDate{

left:120px;
font-size:16px;
}

.candidateCode{
position:absolute;
top:265px;
left:120px;
font-size:16px;
}

/* ===== CENTER INFO ===== */

.centre{
position:absolute;

}

.sessionDate{

font-size:16px;
}

.resultDate{
position:absolute;
top:380px;

font-size:16px;
}

/* ===== RESULTS TABLE ===== */

.writing{
position:absolute;
top:470px;
left:260px;
font-size:16px;
font-weight:bold;
}

.reading{
position:absolute;
top:510px;
left:260px;
font-size:16px;
font-weight:bold;
}

.listening{
position:absolute;
top:550px;
left:260px;
font-size:16px;
font-weight:bold;
}

.speaking{
position:absolute;
top:590px;
left:260px;
font-size:16px;
font-weight:bold;
}

/* ===== FINAL LEVEL ===== */

.finalLevel{
position:absolute;
top:640px;
left:350px;
font-size:18px;
font-weight:bold;
}

/* course */

.course{

position:absolute;

top:643px;

left:0;
right:0;

text-align:center;

font-size:19px;
font-weight:bold;

color:#1f2937;

}

/* date */

.date{

position:absolute;

bottom:125px;

left:205px;

font-size:17px;
font-weight:bold;

color:#111827;

}

/* grade */

.grade{

position:absolute;

bottom:100px;

left:200px;

font-size:17px;
font-weight:bold;

color:#111827;

}

/* serial */

.serial{

position:absolute;

bottom:715px;

right:80px;

font-size:16px;
font-weight:bold;

color:#374151;

}

/* QR */

.qr{

position:absolute;

bottom:150px;

right:80px;

}

/* ===== Responsive ===== */

@media(max-width:700px){

#certificate{

transform:scale(.7);
transform-origin:top;

}

}

.app-title{

text-align:center;

font-size:40px;

font-weight:900;

margin-top:30px;

letter-spacing:2px;

/* metallic gamer gradient */

background: linear-gradient(
120deg,
#7f1d1d,
#991b1b,
#1e3a8a,
#312e81,
#7f1d1d
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

/* shine */


}


/* الخط المعدني تحت العنوان */

.app-title::after{

content:"";

display:block;

width:320px;

height:4px;

margin:12px auto;

background: linear-gradient(
90deg,
#ff00cc,
#00ffff,
#00ff9d,
#ffe600,
#ff00cc
);

border-radius:6px;

box-shadow:0 0 6px rgba(255,255,255,0.3);

}



.cert-table{

width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;

}

.cert-table th{

background:#111827;
color:white;
padding:10px;

}

.cert-table td{

padding:10px;
border-bottom:1px solid #ddd;
text-align:center;

}

.cert-table tr:hover{

background:#f1f5f9;

}

.cert-table button{

padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
margin:2px;

}

.cert-table button:nth-child(1){

background:#2563eb;
color:white;

}

.cert-table button:nth-child(2){

background:#16a34a;
color:white;

}

.cert-table button:nth-child(3){

background:#dc2626;
color:white;

}


/* container للسكرول */

.table-container{

max-height:300px;   /* تقريبا 5 صفوف */

overflow-y:auto;

border-radius:8px;

border:1px solid #e5e7eb;

}

/* شكل السكرول */

.table-container::-webkit-scrollbar{

width:8px;

}

.table-container::-webkit-scrollbar-track{

background:#f1f5f9;

}

.table-container::-webkit-scrollbar-thumb{

border-radius:4px;

}

.table-container::-webkit-scrollbar-thumb:hover{

</style>
</head>

<body>

<div class="admin">

<h1 class="app-title">
  Certificate Management System 
</h1>
<h2>Admin Panel</h2>

<!-- البيانات الشخصية -->
<input id="nameInput" placeholder="Nom (Last Name)">
<input id="prenomInput" placeholder="Prénom (First Name)">
<input type="date" id="birthInput" placeholder="Date de naissance">
<input id="codeInput" placeholder="Code Candidat">

<!-- بيانات المركز -->
<input id="centreInput" placeholder="Centre">
<input type="date" id="sessionInput" placeholder="Date de la session">
<input type="date" id="resultInput" placeholder="Date de délivrance des résultats">

<!-- الدرجات -->
<input id="writingInput" placeholder="Compétences en rédaction /10">
<input id="readingInput" placeholder="Compétences en lecture /10">
<input id="listeningInput" placeholder="Capacité d'écoute /10">
<input id="speakingInput" placeholder="Compétences orales /10">

<input id="levelInput" placeholder="Niveau CECRL Final">

<br><br>

<button id="generateBtn" onclick="generate()">Generate Certificate</button>
<button onclick="updateCertificate()">Update Certificate</button>
<button id="downloadBtn">Download Image</button>
<button onclick="printCertificate()">Print Certificate</button>

<h3>Print Calibration</h3>

<button onclick="moveUp()">⬆ Up</button>
<button onclick="moveDown()">⬇ Down</button>
<button onclick="moveLeft()">⬅ Left</button>
<button onclick="moveRight()">➡ Right</button>
<button onclick="resetPrint()">Reset</button>

<br><br>

<h3>Search Certificate</h3>
<div id="adminTable"></div>
<input id="searchSerial" placeholder="Enter Serial Number">

<button onclick="searchCertificate()">Search</button>
<button onclick="showAdminTable()">Admin Dashboard</button>

</div>


<!-- الشهادة -->
<div id="certificate">

<img src="certificate.jpeg" class="bg">

<div class="serial" id="serial"></div>

<!-- البيانات الشخصية -->
<div class="name" id="name"></div>
<div class="prenom" id="prenom"></div>
<div class="birthDate" id="birthDate"></div>
<div class="candidateCode" id="candidateCode"></div>

<!-- بيانات المركز -->
<div class="centre" id="centre"></div>
<div class="sessionDate" id="sessionDate"></div>
<div class="resultDate" id="resultDate"></div>

<!-- النتائج -->
<div class="writing" id="writing"></div>
<div class="reading" id="reading"></div>
<div class="listening" id="listening"></div>
<div class="speaking" id="speaking"></div>

<!-- النتيجة النهائية -->
<div class="finalLevel" id="finalLevel"></div>

<!-- QR -->
<div class="qr" id="qrcode"></div>

</div>

</body>
<script>

let offsetX = localStorage.getItem("printOffsetX") || 0;
let offsetY = localStorage.getItem("printOffsetY") || 0;


  let editingSerial = null;


    // عند الضغط على أي مكان في الصفحة، أدخل وضع ملء الشاشة
    document.addEventListener("click", () => {
      const elem = document.documentElement; // أو document.getElementById("myForm")
      if (document.fullscreenElement) return; // لا تفعل شيء إذا كنا بالفعل في ملء الشاشة

      if (elem.requestFullscreen) {
        elem.requestFullscreen();
      } else if (elem.webkitRequestFullscreen) { /* Safari */
        elem.webkitRequestFullscreen();
      } else if (elem.msRequestFullscreen) { /* IE11 */
        elem.msRequestFullscreen();
      }
    });


function generateSerial(){
return Math.floor(10000000 + Math.random()*90000000).toString()
}


function safeValue(id){
let el = document.getElementById(id);
return el ? el.value.trim() : "";
}

function generate(){

let btn = document.getElementById("generateBtn");

if(btn.disabled){
return;
}

btn.disabled = true;
btn.innerText = "Generating...";

/* قراءة البيانات */

let name = safeValue("nameInput")
let prenom = safeValue("prenomInput")
let birthDate = safeValue("birthInput")
let candidateCode = safeValue("codeInput")

let centre = safeValue("centreInput")
let sessionDate = safeValue("sessionInput")
let resultDate = safeValue("resultInput")

let writing = safeValue("writingInput")
let reading = safeValue("readingInput")
let listening = safeValue("listeningInput")
let speaking = safeValue("speakingInput")

let finalLevel = safeValue("levelInput")

/* تحقق بسيط */

if(!name || !prenom){
alert("Please enter Name & Prenom");
btn.disabled = false;
btn.innerText = "Generate Certificate";
return;
}

/* سيريال */

let serial = editingSerial ? editingSerial : generateSerial()

/* عرض البيانات */

document.getElementById("name").innerText = name

if(document.getElementById("prenom"))
document.getElementById("prenom").innerText = prenom

if(document.getElementById("birthDate"))
document.getElementById("birthDate").innerText = birthDate

if(document.getElementById("candidateCode"))
document.getElementById("candidateCode").innerText = candidateCode

if(document.getElementById("centre"))
document.getElementById("centre").innerText = centre

if(document.getElementById("sessionDate"))
document.getElementById("sessionDate").innerText = sessionDate

if(document.getElementById("resultDate"))
document.getElementById("resultDate").innerText = resultDate

if(document.getElementById("writing"))
document.getElementById("writing").innerText = writing

if(document.getElementById("reading"))
document.getElementById("reading").innerText = reading

if(document.getElementById("listening"))
document.getElementById("listening").innerText = listening

if(document.getElementById("speaking"))
document.getElementById("speaking").innerText = speaking

if(document.getElementById("finalLevel"))
document.getElementById("finalLevel").innerText = finalLevel

/* السيريال */

document.getElementById("serial").innerText = "Serial ILC : " + serial

/* QR */

let verifyLink = "https://etiqotwf.github.io/liveServer1/ilc/ilcCertificate/verify.html?serial=" + serial;

document.getElementById("qrcode").innerHTML=""

new QRCode(document.getElementById("qrcode"),{
text:verifyLink,
width:90,
height:90
})

/* حفظ محلي */

let certs = JSON.parse(localStorage.getItem("certificates") || "[]")

certs.push({
name,
prenom,
birthDate,
candidateCode,
centre,
sessionDate,
resultDate,
writing,
reading,
listening,
speaking,
finalLevel,
serial
})

localStorage.setItem("certificates", JSON.stringify(certs))

/* إرسال Google Sheet */

const formData = new URLSearchParams();

formData.append("action","add");
formData.append("name",name);
formData.append("prenom",prenom);
formData.append("birthDate",birthDate);
formData.append("candidateCode",candidateCode);
formData.append("centre",centre);
formData.append("sessionDate",sessionDate);
formData.append("resultDate",resultDate);
formData.append("writing",writing);
formData.append("reading",reading);
formData.append("listening",listening);
formData.append("speaking",speaking);
formData.append("finalLevel",finalLevel);
formData.append("serial",serial);

fetch("https://script.google.com/macros/s/AKfycbyqvacwgvC6UionZ7SmsI9HJUTOB_9isWkHWckaaf5UNGJnlqWaCnmabVAKtDv5ZDN6hg/exec",{

method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:formData.toString()

})
.then(response => response.text())

.then(res => {

console.log("✅ Certificate saved:", res);

btn.disabled = false;
btn.innerText = "Generate Certificate";

})

.catch(error => {

console.error("❌ Error:", error);

btn.disabled = false;
btn.innerText = "Generate Certificate";

});

}



function download(){

const cert = document.getElementById("certificate");

html2canvas(cert,{
scale:3
}).then(canvas => {

const link = document.createElement("a");
link.download = "certificate.png";
link.href = canvas.toDataURL();
link.click();

});

}

document.getElementById("downloadBtn").addEventListener("click", download);


function searchCertificate(){

let serial=document.getElementById("searchSerial").value

let certs=JSON.parse(localStorage.getItem("certificates")||"[]")

let student=certs.find(c=>c.serial===serial)

if(student){

document.getElementById("name").innerText=student.name
document.getElementById("course").innerText=student.course
document.getElementById("grade").innerText=student.grade
document.getElementById("date").innerText=student.date
document.getElementById("serial").innerText="Serial : "+student.serial

document.getElementById("qrcode").innerHTML=""

let verifyLink="https://etiqotwf.github.io/liveServer1/ilc/ilcCertificate/verify.html?serial="+student.serial;

new QRCode(document.getElementById("qrcode"),{
text:verifyLink,
width:90,
height:90
})

}else{

alert("Certificate Not Found")

}

}


window.onload=function(){

let params=new URLSearchParams(window.location.search)

let serial=params.get("serial")

if(serial){

let certs=JSON.parse(localStorage.getItem("certificates")||"[]")

let student=certs.find(c=>c.serial===serial)

if(student){

document.getElementById("name").innerText=student.name
document.getElementById("course").innerText=student.course
document.getElementById("grade").innerText=student.grade
document.getElementById("date").innerText=student.date
document.getElementById("serial").innerText="Serial : "+student.serial

}

}

}


function showAdminTable(){

let container = document.getElementById("adminTable");

if(container.innerHTML !== ""){
container.innerHTML="";
return;
}

fetch("https://script.google.com/macros/s/AKfycbyqvacwgvC6UionZ7SmsI9HJUTOB_9isWkHWckaaf5UNGJnlqWaCnmabVAKtDv5ZDN6hg/exec?action=list")

.then(res=>res.json())

.then(certs=>{

let html = `
<h2>Certificates Dashboard</h2>

<div class="table-container">

<table class="cert-table">

<tr>
<th>Serial</th>
<th>Student</th>
<th>Course</th>
<th>Actions</th>
</tr>
`;

certs.forEach(cert=>{

html += `

<tr>

<td>${cert.serial}</td>

<td>${cert.name}</td>

<td>${cert.course}</td>

<td>

<button onclick="viewCert('${cert.serial}')">View</button>

<button onclick="editCert('${cert.serial}')">Edit</button>

<button onclick="deleteCert('${cert.serial}')">Delete</button>

</td>


</tr>

`;

});

html += `</table></div>`;

container.innerHTML = html;

});

}



function deleteCert(serial){

if(!confirm("Are you sure you want to delete this certificate?")){
return;
}

const formData = new URLSearchParams();

formData.append("action","delete");
formData.append("serial",serial);

fetch("https://script.google.com/macros/s/AKfycbyqvacwgvC6UionZ7SmsI9HJUTOB_9isWkHWckaaf5UNGJnlqWaCnmabVAKtDv5ZDN6hg/exec",{

method:"POST",

headers:{
"Content-Type":"application/x-www-form-urlencoded"
},

body:formData.toString()

})

.then(response => response.text())

.then(res => {


showAdminTable();

})

.catch(error => {

console.error(error);

alert("Error deleting certificate");

});

}


function viewCert(serial){

fetch("https://script.google.com/macros/s/AKfycbyqvacwgvC6UionZ7SmsI9HJUTOB_9isWkHWckaaf5UNGJnlqWaCnmabVAKtDv5ZDN6hg/exec?action=get&serial=" + serial)

.then(response => response.json())

.then(cert => {

if(!cert){
alert("Certificate not found");
return;
}

/* اصلاح التاريخ */

let formattedDate = cert.date.split("T")[0];

document.getElementById("name").innerText = cert.name;
document.getElementById("course").innerText = cert.course;
document.getElementById("grade").innerText = cert.grade;
document.getElementById("date").innerText = formattedDate;
document.getElementById("serial").innerText = "Serial ILC : " + serial

// إنشاء QR

document.getElementById("qrcode").innerHTML="";

let verifyLink="https://etiqotwf.github.io/liveServer1/ilc/ilcCertificate/verify.html?serial="+cert.serial;

new QRCode(document.getElementById("qrcode"),{
text:verifyLink,
width:90,
height:90
});

})

.catch(err => {

console.error(err);
alert("Error loading certificate");

});

}

function updateCertificate(){

if(!editingSerial){

alert("No certificate selected for editing");

return;

}

let name = document.getElementById("nameInput").value
let course = document.getElementById("courseInput").value
let grade = document.getElementById("gradeInput").value
let date = document.getElementById("dateInput").value

const formData = new URLSearchParams();

formData.append("action","update");
formData.append("name",name);
formData.append("course",course);
formData.append("grade",grade);
formData.append("date",date);
formData.append("serial",editingSerial);

fetch("https://script.google.com/macros/s/AKfycbyqvacwgvC6UionZ7SmsI9HJUTOB_9isWkHWckaaf5UNGJnlqWaCnmabVAKtDv5ZDN6hg/exec",{
method:"POST",

headers:{
"Content-Type":"application/x-www-form-urlencoded"
},

body:formData.toString()

})

.then(res => res.text())

.then(data => {



editingSerial = null;

document.getElementById("nameInput").value="";
document.getElementById("courseInput").value="";
document.getElementById("gradeInput").value="";
document.getElementById("dateInput").value="";

showAdminTable();

});

}
function editCert(serial){

fetch("https://script.google.com/macros/s/AKfycbyqvacwgvC6UionZ7SmsI9HJUTOB_9isWkHWckaaf5UNGJnlqWaCnmabVAKtDv5ZDN6hg/exec?action=get&serial=" + serial)

.then(res => res.json())

.then(cert => {

if(!cert){
alert("Certificate not found");
return;
}

/* تجهيز التاريخ */

let formattedDate = cert.date.split("T")[0];

/* ملء الفورم */

document.getElementById("nameInput").value = cert.name;
document.getElementById("courseInput").value = cert.course;
document.getElementById("gradeInput").value = cert.grade;
document.getElementById("dateInput").value = formattedDate;

editingSerial = cert.serial;

/* عرض الشهادة */

document.getElementById("name").innerText = cert.name;
document.getElementById("course").innerText = cert.course;
document.getElementById("grade").innerText = cert.grade;
document.getElementById("date").innerText = formattedDate;
document.getElementById("serial").innerText = "Serial ILC : " + serial

/* إنشاء QR */

document.getElementById("qrcode").innerHTML="";

let verifyLink="https://etiqotwf.github.io/liveServer1/ilc/ilcCertificate/verify.html?serial="+cert.serial;

new QRCode(document.getElementById("qrcode"),{
text:verifyLink,
width:90,
height:90
});

})

.catch(err=>{
console.error(err);
alert("Error loading certificate");
});

}

function moveUp(){
offsetY--;
saveOffset();
}

function moveDown(){
offsetY++;
saveOffset();
}

function moveLeft(){
offsetX--;
saveOffset();
}

function moveRight(){
offsetX++;
saveOffset();
}

function resetPrint(){

offsetX=0;
offsetY=0;

saveOffset();

alert("Calibration Reset");

}

function saveOffset(){

localStorage.setItem("printOffsetX",offsetX);
localStorage.setItem("printOffsetY",offsetY);

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ILC Institute - Certificate Verification</title>

<style>

body{

margin:0;
font-family:'Segoe UI',Tahoma;
background:linear-gradient(135deg,#0f172a,#1e3a8a,#0f172a);
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;

}

/* card */

.verify-card{

background:rgba(255,255,255,0.95);
width:90%;
max-width:420px;
border-radius:18px;
padding:30px;
box-shadow:0 30px 80px rgba(0,0,0,.45);
text-align:center;
backdrop-filter:blur(10px);

transition:.3s;

}

.verify-card:hover{

transform:translateY(-5px);
box-shadow:0 40px 90px rgba(0,0,0,.5);

}

/* institute */

.institute{

font-size:28px;
font-weight:900;
letter-spacing:1px;

background:linear-gradient(90deg,#2563eb,#06b6d4,#2563eb);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

margin-bottom:5px;

}

.subtitle{

color:#64748b;
font-size:14px;
margin-bottom:20px;

}

/* verified badge */

.status{

background:linear-gradient(90deg,#22c55e,#16a34a);
color:white;
padding:12px;
border-radius:8px;
font-weight:700;
margin-bottom:20px;
font-size:15px;

box-shadow:0 6px 15px rgba(34,197,94,.4);

}

/* info */

.info{

background:#f1f5f9;
padding:20px;
border-radius:12px;
text-align:left;

box-shadow:inset 0 2px 10px rgba(0,0,0,.05);

}

/* row */

.row{

margin:14px 0;
font-size:15px;

display:flex;
justify-content:space-between;
align-items:center;

}

.row span{

font-weight:800;
color:#1e293b;

}

.row div{

font-weight:700;
color:#0f172a;

}

/* serial */

.serial{

margin-top:18px;
font-size:14px;
color:#334155;
font-weight:700;

}

/* button */

.viewBtn{

margin-top:25px;
padding:14px 25px;

background:linear-gradient(90deg,#2563eb,#06b6d4);

color:white;
border:none;

border-radius:8px;
cursor:pointer;

font-weight:800;
font-size:15px;

transition:.3s;

box-shadow:0 8px 20px rgba(37,99,235,.5);

}

.viewBtn:hover{

transform:scale(1.05);
box-shadow:0 12px 30px rgba(37,99,235,.7);

}
</style>

</head>

<body>

<div class="verify-card">

<div class="institute">
ILC TANTA Institute
</div>

<div class="subtitle">
Certificate Verification System
</div>

<div class="status">
✅ Certificate Verified
</div>

<div class="info">
    
<div class="row">
<span>Student Name :</span>
<span id="name"></span>
</div>

<div class="row">
<span>Course :</span>
<span id="course"></span>
</div>

<div class="row">
<span>Grade :</span>
<span id="grade"></span>
</div>

<div class="row">
<span>Date :</span>
<span id="date"></span>
</div>

</div>

<div class="serial">
Certificate ID : <span id="serial"></span>
</div>

<button class="viewBtn" onclick="showCertificate()">
View Certificate
</button>

</div>


<!-- certificate -->

<div id="certificate">

<img src="certificate.jpeg" class="bg">

<div class="name" id="certName"></div>
<div class="course" id="certCourse"></div>
<div class="date" id="certDate"></div>
<div class="grade" id="certGrade"></div>
<div class="serialCert" id="certSerial"></div>

</div>

<script>
function loadCert(serial){

fetch("https://script.google.com/macros/s/AKfycbyB6JrOtIoQxPcKPTiyto59ogKqsq1fBPt8X62c2i7Dw_Si9TmaTC84rdmWRCsBh_bHBQ/exec?serial=" + serial)

.then(response => response.json())

.then(cert => {

if(cert.error){

alert("Certificate not found");
return;

}

document.getElementById("name").innerText = cert.name;
document.getElementById("course").innerText = cert.course;
document.getElementById("grade").innerText = cert.grade;
document.getElementById("date").innerText = cert.date;
document.getElementById("serial").innerText = cert.serial;

/* certificate view */

document.getElementById("certName").innerText = cert.name;
document.getElementById("certCourse").innerText = cert.course;
document.getElementById("certGrade").innerText = cert.grade;
document.getElementById("certDate").innerText = cert.date;
document.getElementById("certSerial").innerText = cert.serial;

})

.catch(error => {

console.error("Error loading certificate:", error);

});

}

function showCertificate(){

document.getElementById("certificate").style.display="block"

}

/* load from QR */

let params=new URLSearchParams(window.location.search)

let serial=params.get("serial")

if(serial){

loadCert(serial)

}

</script>

</body>
</html>
